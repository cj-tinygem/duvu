# Cortex governance policy
# 기본 정책. 프로젝트 성숙도에 맞춰 수정하세요.
schema_version: 1

# 쓰기 연산(compile/record/resolve/sync/import)을
# archive/audit-trail.jsonl 에 append-only로 기록한다.
audit_trail_enabled: true

# 이 경로들에 대한 쓰기는 CLI에서 차단된다.
# (수동 편집은 막지 않는다 — 감사 대상일 뿐.)
protected_paths:
  - archive/
  - raw/legacy/

# 이 경로 또는 타입을 건드리기 전에 승인 플래그가 필요.
# CTX_APPROVE=1 또는 --approve 로 부여.
require_approval:
  paths: []
  types: []

# 쓰기 본문에서 이 패턴이 탐지되면 경고한다.
# block_on_secret: true 로 바꾸면 쓰기 자체가 차단된다.
secret_patterns:
  - "AKIA[0-9A-Z]{16}"
  - "-----BEGIN (RSA |OPENSSH |)PRIVATE KEY-----"
  - "ghp_[A-Za-z0-9]{30,}"
  - "xox[baprs]-[A-Za-z0-9-]{10,}"
  - "sk-[A-Za-z0-9]{20,}"
block_on_secret: false

# legacy 데이터 drift 처리 기본값
legacy:
  sync_mode: warn      # warn | mirror | ignore
  reimport_policy: preserve  # preserve | overwrite | archive
  # legacy_sources 의 임의 디렉토리 스캔 시 추적할 확장자 (find -name glob).
  # 기본 4종 외에 .json/.csv/.html 등 필요한 확장자 추가 가능.
  scan_patterns:
    - "*.md"
    - "*.yaml"
    - "*.yml"
    - "*.txt"

# retrieval backend 운영 상한
retrieval:
  max_backends: 8
  max_timeout_ms: 30000
